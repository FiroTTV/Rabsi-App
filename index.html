<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Rabsi – Nail Streak 💅</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a2e">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
:root {
    --bg-gradient: linear-gradient(135deg, #2b1d3a, #1e1e2f, #2a1f4f);
    --accent: #7a5cff;
    --success: #7be495;
    --fail: #ff8a8a;
}

html, body {
    margin: 0; padding: 0;
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    background: var(--bg-gradient);
    color: #ffffff;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
}

body { display: flex; justify-content: center; align-items: flex-start; padding: 24px 0; }

#stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.star { position: absolute; width: 2px; height: 2px; background: radial-gradient(circle, #fff, #c7b3ff); border-radius: 50%; animation: floatStar linear infinite; }
@keyframes floatStar { from { transform: translateY(100vh); opacity: 0; } 50% { opacity: 1; } to { transform: translateY(-10vh); opacity: 0; } }

.app {
    position: relative; z-index: 2;
    background: rgba(30, 27, 46, 0.95);
    width: 90%; max-width: 420px;
    border-radius: 28px; padding: 24px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.05);
}
.hidden { display: none !important; }

h1 { text-align: center; margin-bottom: 16px; font-weight: 800; font-size: 1.5rem; }

.top-nav { display: flex; gap: 10px; margin-bottom: 12px; }
.top-nav button { margin-bottom: 0; flex: 1; background: #3a3a55; color: white; padding: 10px; }

.nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; background: rgba(255,255,255,0.05); border-radius: 14px; padding: 6px; }
.nav-btn { width: 42px; height: 42px; background: var(--accent); color: white; border-radius: 10px; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; }
.subtitle { font-weight: 700; color: #aaa; }

.streak { text-align: center; background: #2a2a3d; border-radius: 16px; padding: 16px; margin-bottom: 20px; font-size: 22px; font-weight: 700; border: 1px solid rgba(122,92,255,0.2); }

button { width: 100%; padding: 14px; border-radius: 16px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; margin-bottom: 10px; transition: transform 0.1s, opacity 0.2s; }
button:active { transform: scale(0.98); }

.buttons { display: flex; gap: 12px; margin-bottom: 20px; }
.buttons button { width: 50%; margin-bottom: 0; }

.yes { background: var(--success); color: #000; box-shadow: 0 4px 15px rgba(123,228,149,0.3); }
.no  { background: var(--fail); color: #000; box-shadow: 0 4px 15px rgba(255,138,138,0.3); }
button:disabled { opacity: 0.4; cursor: not-allowed; }

.calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 20px; }
.day { aspect-ratio: 1; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 600; background: #333; font-size: 13px; }
.future { background: #444; opacity: 0.2; }
.success { background: var(--success) !important; color: #000; box-shadow: 0 0 10px var(--success); }
.fail { background: var(--fail) !important; color: #000; }
.today { outline: 2px solid var(--accent); outline-offset: -2px; }

.gift { text-align: center; padding: 18px; border-radius: 16px; background: #2a2a3d; }
.locked { color: #888; border: 1px dashed #444; }
.unlocked { background: linear-gradient(135deg, #ffd700, #ffa500); color: #000; font-weight: 800; box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }

/* ===== DUOLINGO STREAK ANIMATION OVERLAY ===== */
#streakOverlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    z-index: 2000; backdrop-filter: blur(10px);
}
.fire-icon { font-size: 100px; animation: popFire 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.streak-text { font-size: 32px; font-weight: 900; margin-top: 20px; color: #fff; text-align: center; }
.streak-sub { font-size: 18px; color: var(--accent); margin-top: 10px; }

@keyframes popFire {
    0% { transform: scale(0) rotate(-20deg); opacity: 0; }
    70% { transform: scale(1.3) rotate(10deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

/* Modals & Inputs */
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(8px); }
.modal-content { background: #1c1c28; padding: 24px; border-radius: 24px; width: 85%; max-width: 400px; }
input, select { width: 100%; padding: 14px; border-radius: 12px; border: none; margin-bottom: 12px; background: #2a2a3d; color: white; font-size: 16px; box-sizing: border-box; }
</style>
</head>

<body>
<div id="stars"></div>

<div id="streakOverlay" onclick="this.style.display='none'">
    <div class="fire-icon">🔥</div>
    <div class="streak-text" id="overlayStreakNum">0 TAGE!</div>
    <div class="streak-sub">Du bist unaufhaltsam! 💅</div>
    <button class="yes" style="width: auto; padding: 12px 30px; margin-top: 30px;">Weiter</button>
</div>

<div class="app" id="loginBox">
    <h1>💜 Rabsi Login</h1>
    <input id="email" type="email" placeholder="E-Mail" autocomplete="email">
    <input id="password" type="password" placeholder="Passwort">
    <button class="yes" id="loginBtn" onclick="login()">Einloggen / Registrieren</button>
</div>

<div class="app hidden" id="appBox">
    <h1>✨ Rabsi's Nail-Streak</h1>
    <div class="top-nav">
        <button onclick="openStats()">📊 Statistik</button>
        <button onclick="openAccount()">⚙️ Account</button>
    </div>
    <div class="nav-header">
        <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
        <div class="subtitle" id="monthTitle"></div>
        <button class="nav-btn" onclick="changeMonth(1)">▶</button>
    </div>
    <div class="streak" id="streakBox">🔥 0 Tage Streak</div>
    <div class="calendar" id="calendar"></div>
    <div class="buttons">
        <button class="yes" id="btnYes">Laden...</button>
        <button class="no" id="btnNo">Laden...</button>
    </div>
    <div class="gift locked" id="giftBox">🔒 Lädt...</div>
    <button onclick="logout()" style="background:transparent; color:#888; font-size:12px; margin-top:10px;">🚪 Logout</button>
    <button id="adminToggle" onclick="toggleAdmin()" style="font-size:10px; background:transparent; color:#333;">Admin: AUS</button>
</div>

<div class="modal" id="statsModal">
    <div class="modal-content">
        <h2>📊 Statistik</h2>
        <select id="monthSelect"></select>
        <div id="statsSummary" style="margin-bottom: 15px;"></div>
        <button onclick="closeStats()" style="background:#444; color:white;">Schließen</button>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBjc2ti7FM5hRIzMrMxOsLIA_K5ulBRP3w",
  authDomain: "rabsi-nail-streak.firebaseapp.com",
  projectId: "rabsi-nail-streak",
  appId: "1:261656631522:web:9b79c2cbc0e1e8790126bb"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let data = {};
let isAdmin = localStorage.getItem("rabsiAdmin") === "1";
let displayDate = new Date(); displayDate.setDate(1);
const today = new Date();

/* STARS */
const starsContainer = document.getElementById("stars");
for (let i = 0; i < 40; i++) {
    const s = document.createElement("div"); s.className = "star";
    s.style.left = Math.random() * 100 + "vw";
    s.style.animationDuration = (15 + Math.random() * 15) + "s";
    starsContainer.appendChild(s);
}

/* HELPER */
function formatDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function getTargetDate() {
    const now = new Date();
    const target = new Date(now);
    if (now.getHours() < 20) target.setDate(now.getDate() - 1);
    return target;
}

/* AUTH */
auth.onAuthStateChanged(user => {
    if (!user) {
        document.getElementById("loginBox").classList.remove("hidden");
        document.getElementById("appBox").classList.add("hidden");
        return;
    }
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("appBox").classList.remove("hidden");
    db.collection("users").doc(user.uid).onSnapshot(doc => {
        data = doc.data()?.streakData || {};
        updateAppView();
    });
});

async function login() {
    const e = document.getElementById("email").value.trim(), p = document.getElementById("password").value.trim();
    if (!e || !p) return alert("Daten eingeben");
    try { await auth.signInWithEmailAndPassword(e, p); } catch (err) {
        try { await auth.createUserWithEmailAndPassword(e, p); } catch (regErr) { alert(regErr.message); }
    }
}

/* DUOLINGO STYLE ANIMATION */
function showStreakAnimation(streakCount) {
    const overlay = document.getElementById("streakOverlay");
    document.getElementById("overlayStreakNum").textContent = streakCount + " TAGE!";
    overlay.style.display = "flex";
    
    // Konfetti Regen
    const duration = 3 * 1000;
    const end = Date.now() + duration;

    (function frame() {
      confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#7a5cff', '#7be495'] });
      confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#7a5cff', '#7be495'] });
      if (Date.now() < end) requestAnimationFrame(frame);
    }());
}

/* MAIN LOGIC */
function updateAppView() {
    document.getElementById("monthTitle").textContent = displayDate.toLocaleString("de-DE", { month: "long", year: "numeric" });
    buildCalendar();
    const currentStreak = calculateStreak();
    document.getElementById("streakBox").textContent = `🔥 ${currentStreak} Tage Streak`;
    checkGift();
    applyTimeLock();
}

function calculateStreak() {
    let streak = 0; let check = new Date();
    if (data[formatDate(check)] === undefined) check.setDate(check.getDate() - 1);
    while (data[formatDate(check)] === "success") { streak++; check.setDate(check.getDate() - 1); }
    return streak;
}

function applyTimeLock() {
    const target = getTargetDate();
    const key = formatDate(target);
    const bY = document.getElementById("btnYes"), bN = document.getElementById("btnNo");
    const isToday = target.toDateString() === new Date().toDateString();
    const label = isToday ? "Heute" : "Gestern";
    
    if (data[key]) {
        bY.disabled = bN.disabled = true;
        bY.textContent = `${label}: ${data[key] === 'success' ? 'Clean ✅' : '-'}`;
        bN.textContent = `${label}: ${data[key] === 'fail' ? 'Gekaut ❌' : '-'}`;
    } else {
        bY.disabled = bN.disabled = false;
        bY.textContent = `${label} clean ✅`; bN.textContent = `${label} gekaut ❌`;
    }
}

function buildCalendar() {
    const cal = document.getElementById("calendar"); cal.innerHTML = "";
    const y = displayDate.getFullYear(), m = displayDate.getMonth();
    const offset = (new Date(y, m, 1).getDay() + 6) % 7;
    const dim = new Date(y, m + 1, 0).getDate();
    for (let i = 0; i < offset; i++) cal.appendChild(document.createElement("div"));
    for (let d = 1; d <= dim; d++) {
        const el = document.createElement("div"); el.className = "day"; el.textContent = d;
        const k = `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
        if (new Date(y, m, d) > today) el.classList.add("future");
        if (data[k] === "success") el.classList.add("success");
        if (data[k] === "fail") el.classList.add("fail");
        if (y === today.getFullYear() && m === today.getMonth() && d === today.getDate()) el.classList.add("today");
        cal.appendChild(el);
    }
}

async function saveToday(res) {
    const target = getTargetDate();
    const key = formatDate(target);
    if (data[key] && !isAdmin) return;
    
    await db.collection("users").doc(auth.currentUser.uid).set({ streakData: { [key]: res } }, { merge: true });
    
    if (res === 'success') {
        // Berechne neuen Streak für die Animation
        data[key] = 'success'; 
        showStreakAnimation(calculateStreak());
    }
}

document.getElementById("btnYes").onclick = () => saveToday("success");
document.getElementById("btnNo").onclick = () => saveToday("fail");

/* RESTLICHE FUNKTIONEN */
function changeMonth(d) { displayDate.setMonth(displayDate.getMonth() + d); updateAppView(); }
function openStats(){ document.getElementById("statsModal").style.display = "flex"; buildStatsOptions(); }
function closeStats(){ document.getElementById("statsModal").style.display = "none"; }
function logout() { auth.signOut(); }
function toggleAdmin() { isAdmin = !isAdmin; localStorage.setItem("rabsiAdmin", isAdmin ? "1" : "0"); location.reload(); }

function checkGift() {
    const giftBox = document.getElementById("giftBox");
    const y = displayDate.getFullYear(), m = displayDate.getMonth();
    const dim = new Date(y, m + 1, 0).getDate();
    let s = 0, f = false;
    for (let d = 1; d <= dim; d++) {
        const k = `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
        if (data[k] === "success") s++; else if (data[k] === "fail") f = true;
    }
    if (f) { giftBox.className = "gift locked"; giftBox.textContent = "❌ Monat verloren"; }
    else if (s === dim) { giftBox.className = "gift unlocked"; giftBox.innerHTML = "🎁 GESCHENK FREIGESCHALTET 🎉"; }
    else { giftBox.className = "gift locked"; giftBox.textContent = `🔒 Noch ${dim - s} Tage bis zum Geschenk 🎁`; }
}

function buildStatsOptions() {
    const sel = document.getElementById("monthSelect"); sel.innerHTML = "";
    const months = [...new Set(Object.keys(data).map(k => k.slice(0, 7)))].sort().reverse();
    months.forEach(m => { const opt = document.createElement("option"); opt.value = m; opt.textContent = m; sel.appendChild(opt); });
    sel.onchange = () => {
        const mk = sel.value; let s=0, f=0;
        Object.keys(data).filter(k => k.startsWith(mk)).forEach(k => { if(data[k]==="success") s++; else f++; });
        document.getElementById("statsSummary").innerHTML = `🟢 Clean: ${s} | 🔴 Gekaut: ${f}`;
    };
    if(months.length > 0) sel.onchange();
}
</script>
</body>
</html>
